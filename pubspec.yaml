name: notesync_app
description: "一个跨平台的笔记与待办事项同步应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  gap: ^3.0.1
  uuid: ^4.4.0
  shared_preferences: ^2.2.2      # 本地存储
  intl: ^0.20.2                 # 日期格式化
  flutter_slidable: ^3.0.0        # 侧滑删除
  flutter_staggered_grid_view: ^0.7.0
  search_page: ^2.1.1            # 搜索页面
  hive: ^2.2.3                   # 本地持久化
  hive_flutter: ^1.1.0           # Hive Flutter适配
  # 富文本编辑器
  flutter_quill: ^11.5.0
  # 图片选择
  image_picker: ^1.0.7
  # 获取本地存储路径
  path_provider: ^2.1.2
  # 文件抽象 (image_picker 依赖)
  cross_file: ^0.3.3

  window_manager: ^0.4.3
  animations: ^2.0.11
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  supabase_flutter: ^2.12.0
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1         # Hive代码生成器
  build_runner: ^2.4.10          # Hive代码生成器运行器

flutter:
  uses-material-design: true
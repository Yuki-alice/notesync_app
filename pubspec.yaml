version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  gap: ^3.0.1
  uuid: ^4.4.0
  shared_preferences: ^2.2.2
